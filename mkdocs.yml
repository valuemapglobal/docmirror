site_name: DocMirror
site_url: https://valuemapglobal.github.io/docmirror
site_description: Universal document parsing engine — extract structured data from any document format
site_author: ValueMap Global

repo_name: valuemapglobal/docmirror
repo_url: https://github.com/valuemapglobal/docmirror

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Architecture: guide/architecture.md
    - Configuration: guide/configuration.md
    - Format Support: guide/formats.md
  - Plugins:
    - Overview: plugins/overview.md
    - Creating Plugins: plugins/creating-plugins.md
  - API Reference: api/index.md
  - PLG Strategies (Growth): plg-strategies.md
  - Integrations: integrations.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/valuemapglobal/docmirror

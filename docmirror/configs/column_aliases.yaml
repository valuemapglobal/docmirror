# 列映射配置 (Column Mapper Data)
# =================================
# 从 column_mapper.py 外置的数据配置。
# 运行时由 ColumnMapper.__init__ 自动加载。

# 标准化目标列
target_columns:
  - 序号
  - 交易时间
  - 对方账号与户名
  - 摘要
  - 用途
  - 备注
  - 交易金额
  - 账户余额
  - 钞汇
  - 币别

# 不参与标准列映射的原始列名 (保留但不映射)
skip_columns:
  - 企业流水号
  - 凭证种类
  - 凭证号
  - 交易介质编号
  - 账户明细编号-交易流水号
  - 凭证类型凭证号码
  - 凭证类型 凭证号码
  - 凭证类型
  - 凭证号码
  - 交易渠道
  - 交易机构
  - 对方行名
  - 借贷状态
  - 支/收
  - 借贷标志
  - 收支
  - 柜员流水号
  - 摘要代码

# 列名别名库 — 标准名 → 已知别名列表
column_aliases:
  序号:
    - 流水号
    - 序
    - 编号
    - Seq
    - "No"
    - SeqNo
    - 序号

  交易时间:
    - 交易日期
    - 日期
    - 交易日
    - 记账日期
    - 入账日期
    - Date
    - Transaction Date
    - 记帐日期
    - 交易时间

  对方账号与户名:
    - 对方户名
    - 对方名称
    - 收/付款人
    - 对方账户
    - Counterparty
    - 对手方
    - 对方信息
    - 交易对手信息
    - 交易对手
    - 对方户名/账号
    - 对方账户/对方银行
    - 交易机构对方户名/账号

  摘要:
    - 交易摘要
    - 摘要
    - 说明
    - 用途/摘要
    - 备注/摘要
    - Description
    - Summary
    - 交易类型
    - 业务摘要
    - 交易方式
    - 序号摘要
    - 序号 摘要

  用途:
    - 用途
    - 附言
    - Purpose
    - Remark
    - 交易地点/附言
    - 交易地点

  备注:
    - 备注
    - Memo
    - Note
    - 附注

  交易金额:
    - 金额
    - 交易金额
    - 发生额
    - Amount
    - 收入金额
    - 支出金额
    - 人民币
    - 交易额
    - 收入
    - 支出

  账户余额:
    - 余额
    - 账户余额
    - Balance
    - 结存
    - 可用余额
    - 期末余额
    - 本次余额
    - 账户余额现转标志交易渠道
    - 账户余额 现转标志 交易渠道

  钞汇:
    - 钞汇标志
    - 钞汇
    - Cash/Transfer
    - 币别钞汇
    - 币别 钞汇
    - 现转标志
    - 现转

  币别:
    - 币种
    - 币别
    - Currency
    - CCY

# 借贷分列关键字
income_keywords:
  - 收入
  - 贷方
  - 存入
  - 收入金额
  - 贷方发生额
  - Credit

expense_keywords:
  - 支出
  - 借方
  - 支取
  - 支出金额
  - 借方发生额
  - Debit

amount_like_keywords:
  - 发生额
  - 金额
  - 交易金额
  - 交易额
  - Amount

name: Bug Report
description: Create a report to help us improve DocMirror parsing and robustness
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: DocMirror Version
      description: What version of DocMirror are you using? (e.g., 0.1.0 or main branch)
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: What environment are you running DocMirror in?
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (CentOS/RHEL)
        - Windows
        - Docker
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: "When parsing a PDF with X characteristics, the output completely skips table Y..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this? Please provide code snippets or CLI commands.
      placeholder: |
        1. Download this sample PDF: [Link]
        2. Run `docmirror parse sample.pdf`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Traceback
      description: Paste any error logs, tracebacks, or terminal output here.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
